<html>

        <style>
            body{
                margin: 0;
                background-color: #cdd7db;
            }

                background-color: #ffffff;

            ul li a{

            }

            #biodata p{

            }
            #biodata-card{

            padding:2rem;

            #photo-profile, #biodata, #detail-biodata{

            .btn-group-biodata{

            .btn-0{
                background-color: blue;
                color: white;
            }
            .btn-0:hover{
                background-color: white;
                border: 2px solid blue;
                color: blue;
            }
            .btn-1{
                background-color: white;
                color: green;
                border:2px solid green;                
            }
            .btn-1:hover{
                background-color: green;
                color: white;
            }
             .btn-submit{
