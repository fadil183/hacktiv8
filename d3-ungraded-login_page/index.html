<!DOCTYPE html>
<html>
    <head>
        <title>Login</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    </head>
    <body class="bg-light bg-gradient">
         <div class="position-absolute top-50 start-50 translate-middle">
                <form class="form mb3">
                <img class="img-fluid" src="bs-logo.svg" alt="bootstrap-logo" width="450px" height="450px">
                <div class="mb-3">
                    <h1 class="text-center">Please sign in</h1>
                    <div class="vstack gap-0">
                        <input class="form-control rounded-top rounded-bottom-0" placeholder="email@mail.com" type="email" name="email" id="email">
                        <input class="form-control rounded-bottom border-top-0 rounded-top-0" placeholder="*********" type="password" name="password" id="password">
                       <div class="form-check mx-auto m-2">
                            <input class="form-check-input" type="checkbox" name="remember" id="remember">
                            <label class="form-check-label " for="remember">remember me?</label>
                       </div>
                       <button class="form-control text-bg-primary mt-3" type="submit">Sign In</button>
                       <div class="mx-auto">
                       <p class="text-secondary my-5"><small>&copy 2026</small></p>
                       </div>
                    </div>
                </div>
            </form>

         </div>
    </body>
</html>
